[build]
  command = "yarn build"
  publish = "out"

# Home page redirects to /about (replaces redirect() in page.tsx)
[[redirects]]
  from = "/"
  to = "/about"
  status = 301

# Long-lived cache for hashed static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# This covers all images and videos in any folder (e.g., /images/projects/...)
[[headers]]
  for = "/images/**/*.{jpg,png,svg,mp4}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, stale-while-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
